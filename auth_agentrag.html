        async function fetchKBDocuments() {
            const tbody = document.getElementById('kbTableBody');
            const totalEl = document.getElementById('kbTotal');
            const pageInfo = document.getElementById('kbPageInfo');
            const prevBtn = document.getElementById('kbPrevPage');
            const nextBtn = document.getElementById('kbNextPage');
            if (!tbody) return;

            tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon">⏳</div><div class="text">加载中...</div></div></td></tr>';

            try {
                let url = `http://localhost:8000/documents?page=${kbCurrentPage}&page_size=${kbPageSize}`;
                if (kbSearchQuery) url += `&search=${encodeURIComponent(kbSearchQuery)}`;

                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                kbTotalDocs = data.total;
                kbDocuments = data.documents || [];

                renderKBTable(tbody);
                updateKBPagination(totalEl, pageInfo, prevBtn, nextBtn);
            } catch(err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">❌</div><div class="text">加载失败: ${err.message}</div></div></td></tr>`;
            }
        }

        function renderKBTable(tbody) {
            if (!kbDocuments || kbDocuments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon">📂</div><div class="text">暂无文件</div></div></td></tr>';
                return;
            }

            const startIdx = (kbCurrentPage - 1) * kbPageSize;
            tbody.innerHTML = kbDocuments.map((doc, i) => {
                const statusBadge = getStatusBadge(doc.status);
                return `
                    <tr>
                        <td class="col-id">${startIdx + i + 1}</td>
                        <td class="col-name" title="${escapeHtml(doc.filename)}">${escapeHtml(doc.filename)}</td>
                        <td class="col-type">${escapeHtml(doc.file_type)}</td>
                        <td class="col-size">${formatFileSize(doc.file_size)}</td>
                        <td class="col-time">${formatTime(doc.created_at)}</td>
                        <td class="col-status">${statusBadge}</td>
                        <td class="col-actions">
                            <button class="action-btn action-btn-view" data-id="${doc.id}" data-filename="${escapeHtml(doc.filename)}" data-type="${escapeHtml(doc.file_type)}">查看</button>
                            <button class="action-btn action-btn-replace" data-id="${doc.id}">替换</button>
                            <button class="action-btn action-btn-del" data-id="${doc.id}">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');

            // 绑定事件
            tbody.querySelectorAll('.action-btn-view').forEach(btn => {
                btn.addEventListener('click', () => viewDocument(btn.dataset.id, btn.dataset.filename, btn.dataset.type));
            });
            tbody.querySelectorAll('.action-btn-replace').forEach(btn => {
                btn.addEventListener('click', () => replaceDocument(btn.dataset.id));
            });
            tbody.querySelectorAll('.action-btn-del').forEach(btn => {
                btn.addEventListener('click', () => deleteDocument(btn.dataset.id));
            });
        }

        function updateKBPagination(totalEl, pageInfo, prevBtn, nextBtn) {
            const totalPages = Math.ceil(kbTotalDocs / kbPageSize) || 1;
            totalEl.textContent = `共 ${kbTotalDocs} 个文件`;
            pageInfo.textContent = `第 ${kbCurrentPage}/${totalPages} 页`;
            prevBtn.disabled = kbCurrentPage <= 1;
            nextBtn.disabled = kbCurrentPage >= totalPages;
        }

        // ---- 查看文件 ----
        async function viewDocument(docId, filename, fileType) {
            try {
                const res = await fetch(`http://localhost:8000/documents/${docId}/file`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);
                previewBlobUrl = blobUrl;

                showPreviewModal(filename, fileType, blobUrl, blob);
            } catch(err) {
                console.error(err);
                alert('文件查看失败: ' + err.message);
            }
        }

        function showPreviewModal(filename, fileType, blobUrl, blob) {
            if (document.querySelector('.preview-overlay')) return;

            const isImage = ['.png', '.jpg', '.jpeg', '.gif', '.webp'].includes(fileType);
            const isPdf = fileType === '.pdf';
            const isText = ['.txt', '.md'].includes(fileType);

            const overlay = document.createElement('div');
            overlay.className = 'preview-overlay';
            overlay.innerHTML = `
                <div class="preview-modal">
                    <div class="preview-header">
                        <h3>📄 ${escapeHtml(filename)}</h3>
                        <button class="preview-close-btn" id="previewCloseBtn">✕</button>
                    </div>
                    <div class="preview-body" id="previewBody">
                        ${isImage ? `<img src="${blobUrl}" alt="${escapeHtml(filename)}">` : ''}
                        ${isPdf ? `<iframe src="${blobUrl}#toolbar=1"></iframe>` : ''}
                        ${isText ? `<iframe src="${blobUrl}" style="background:white;"></iframe>` : ''}
                        ${!isImage && !isPdf && !isText ? `
                            <div class="preview-placeholder">
                                <div class="icon">📄</div>
                                <div class="text">此类型暂不支持在线预览，请下载后查看</div>
                            </div>
                        ` : ''}
                    </div>
                    <button class="preview-download-btn" id="previewDownloadBtn">⬇️ 下载文件</button>
                </div>
            `;
            document.body.appendChild(overlay);

            const closeBtn = overlay.querySelector('#previewCloseBtn');
            const downloadBtn = overlay.querySelector('#previewDownloadBtn');

            closeBtn.addEventListener('click', closePreviewModal);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closePreviewModal(); });
            downloadBtn.addEventListener('click', () => {
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }

        function closePreviewModal() {
            if (previewBlobUrl) { URL.revokeObjectURL(previewBlobUrl); previewBlobUrl = null; }
            const overlay = document.querySelector('.preview-overlay');
            if (overlay) overlay.remove();
        }

        // ---- 替换文件 ----
        function replaceDocument(docId) {
            if (!token) { alert('请先登录'); return; }
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = '.txt,.pdf,.docx,.md,.xlsx,.html';
            fileInput.onchange = async () => {
                const file = fileInput.files[0];
                if (!file) return;

                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await fetch(`http://localhost:8000/documents/${docId}/replace`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData,
                    });
                    if (res.ok) {
                        alert('✅ 文件已提交替换，正在后台处理...');
                        fetchKBDocuments();
                    } else {
                        const err = await res.json();
                        alert('替换失败: ' + (err.detail || '未知错误'));
                    }
                } catch(err) {
                    alert('替换失败: ' + err.message);
                }
            };
            fileInput.click();
        }

        // ---- 删除文件 ----
        async function deleteDocument(docId) {
            if (!token) { alert('请先登录'); return; }
            if (!confirm('确定要删除此文件吗？删除后不可恢复。')) return;

            try {
                const res = await fetch(`http://localhost:8000/documents/${docId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    fetchKBDocuments();
                } else {
                    const err = await res.json();
                    alert('删除失败: ' + (err.detail || '未知错误'));
                }
            } catch(err) {
                alert('删除失败: ' + err.message);
            }
        }

        // =============================================================
        //  上传模态框
        // =============================================================
        DOM.uploadFileBtn.addEventListener('click', () => {
            if (!token) { alert('请先登录'); return; }
            const modalOverlay = document.createElement('div');
            modalOverlay.className = 'modal-overlay';
            modalOverlay.innerHTML = `
                <div class="upload-modal">
                    <div class="modal-title">📄 上传文档</div>
                    <div class="modal-file-area" id="modalFileArea">
                        <div>📎 点击选择文件（支持多选）</div>
                        <input type="file" id="modalFileInput" multiple accept=".txt,.pdf,.docx,.md,.xlsx,.html">
                        <div class="file-list" id="modalFileList"></div>
                    </div>
                    <div class="modal-strategy">
                        <label>✂️ 文档切分策略</label>
                        <select id="modalStrategySelect">
                            <option value="auto">🤖 自动策略（推荐）</option>
                            <option value="semantic">📄 语义切分</option>
                            <option value="markdown">📝 Markdown元素</option>
                            <option value="html">🌐 HTML元素</option>
                            <option value="sentence_window">📖 句子窗口</option>
                            <option value="unstructured">🔍 Unstructured（精准表格）</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-cancel" id="modalCancelBtn">取消</button>
                        <button class="modal-confirm" id="modalConfirmBtn">确认上传</button>
                    </div>
                    <div class="modal-status" id="modalStatus"></div>
                </div>
            `;
            document.body.appendChild(modalOverlay);
            const fileInput = modalOverlay.querySelector('#modalFileInput');
            const fileListDiv = modalOverlay.querySelector('#modalFileList');
            const strategySelect = modalOverlay.querySelector('#modalStrategySelect');
            const confirmBtn = modalOverlay.querySelector('#modalConfirmBtn');
            const cancelBtn = modalOverlay.querySelector('#modalCancelBtn');
            const modalStatus = modalOverlay.querySelector('#modalStatus');
            const fileArea = modalOverlay.querySelector('#modalFileArea');
            let selectedFiles = [];
            fileArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                selectedFiles = Array.from(e.target.files);
                if (selectedFiles.length === 0) fileListDiv.innerHTML = '';
                else fileListDiv.innerHTML = selectedFiles.map(f => `<div>📄 ${f.name}</div>`).join('');
            });
            confirmBtn.onclick = async () => {
                if (selectedFiles.length === 0) { modalStatus.innerText = '请至少选择一个文件'; return; }
                modalStatus.innerText = '上传中...';
                let selectedStrategy = strategySelect.value;
                if (selectedStrategy === 'auto') selectedStrategy = null;
                let successCount = 0, failCount = 0;
                for (let file of selectedFiles) {
                    const formData = new FormData();
                    formData.append('file', file);
                    if (selectedStrategy) formData.append('parser_strategy', selectedStrategy);
                    try {
                        const res = await fetch('http://localhost:8000/upload', {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${token}` },
                            body: formData
                        });
                        if (res.ok) successCount++;
                        else failCount++;
                    } catch(err) { failCount++; }
                }
                if (successCount > 0) {
                    modalStatus.innerText = `✅ 上传完成：成功 ${successCount} 个，失败 ${failCount} 个`;
                    DOM.uploadStatus.innerText = `已上传 ${successCount} 个文件`;
                    setTimeout(() => DOM.uploadStatus.innerText = '', 3000);
                    setTimeout(() => modalOverlay.remove(), 1500);
                } else {
                    modalStatus.innerText = `❌ 上传失败，请重试`;
                }
            };
            cancelBtn.onclick = () => modalOverlay.remove();
        });

        // 知识库管理按钮
        DOM.kbBtn.addEventListener('click', openKBModal);
        // 任务管理按钮
        DOM.taskBtn.addEventListener('click', openTaskModal);

        // =============================================================
        //  任务管理模块
        // =============================================================
        const TASK_STATUS_CONFIG = {
            'created':       { label: '已创建',   cls: 'task-status-created' },
            'planning':      { label: '规划中',   cls: 'task-status-planning' },
            'executing':     { label: '执行中',   cls: 'task-status-executing' },
            'waiting_human': { label: '待审批',   cls: 'task-status-waiting_human' },
            'waiting_event': { label: '等待中',   cls: 'task-status-waiting_event' },
            'completed':     { label: '已完成',   cls: 'task-status-completed' },
            'failed':        { label: '失败',     cls: 'task-status-failed' },
            'cancelled':     { label: '已取消',   cls: 'task-status-cancelled' },
        };
        const FILTER_CHIPS = [
            { key: '',                label: '全部' },
            { key: 'executing',       label: '执行中' },
            { key: 'waiting_human',   label: '待审批' },
            { key: 'waiting_event',   label: '等待中' },
            { key: 'completed',       label: '已完成' },
            { key: 'failed',         label: '失败' },
        ];

        function getTaskStatusBadge(status) {
            const cfg = TASK_STATUS_CONFIG[status] || { label: status, cls: '' };
            return `<span class="task-status-badge ${cfg.cls}">${cfg.label}</span>`;
        }

        function openTaskModal() {
            if (!token) { alert('请先登录'); return; }
            if (document.querySelector('.task-overlay')) return;

            const overlay = document.createElement('div');
            overlay.className = 'task-overlay';
            overlay.id = 'taskOverlay';
            overlay.innerHTML = `
                <div class="task-modal">
                    <div class="task-header">
                        <h2>📋 任务管理</h2>
                        <div class="task-header-actions">
                            <button class="task-refresh-btn" id="taskRefreshBtn">🔄 刷新</button>
                            <button class="task-close-btn" id="taskCloseBtn">✕</button>
                        </div>
                    </div>
                    <div class="task-filters" id="taskFilters"></div>
                    <div class="task-table-wrap">
                        <table class="task-table">
                            <thead>
                                <tr>
                                    <th style="width:50px;">#</th>
                                    <th class="col-t-goal">任务目标</th>
                                    <th class="col-t-status">状态</th>
                                    <th class="col-t-progress">进度</th>
                                    <th class="col-t-time">更新时间</th>
                                    <th class="col-t-actions">操作</th>
                                </tr>
                            </thead>
                            <tbody id="taskTableBody">
                                <tr><td colspan="6"><div class="empty-state"><div class="icon">⏳</div><div class="text">加载中...</div></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="task-detail-panel" id="taskDetailPanel">
                        <div class="task-detail-grid" id="taskDetailGrid"></div>
                        <div id="taskApprovalArea"></div>
                        <button class="task-detail-close" id="taskDetailCloseBtn">收起详情 ▲</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            // 绑定事件
            overlay.querySelector('#taskCloseBtn').addEventListener('click', closeTaskModal);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeTaskModal(); });
            overlay.querySelector('#taskRefreshBtn').addEventListener('click', fetchTasks);
            overlay.querySelector('#taskDetailCloseBtn').addEventListener('click', closeTaskDetail);

            // 渲染筛选 chips
            renderFilterChips();

            // 初始加载
            fetchTasks();
            // 开始自动刷新 (每10秒)
            startTaskAutoRefresh();
        }

        function closeTaskModal() {
            stopTaskAutoRefresh();
            disconnectTaskEvents();
            const overlay = document.getElementById('taskOverlay');
            if (overlay) overlay.remove();
            taskDetailId = null;
        }

        // ── 筛选 chips ──────────────────────────────────
        function renderFilterChips() {
            const container = document.getElementById('taskFilters');
            if (!container) return;

            // 计算各状态数量
            const counts = {};
            FILTER_CHIPS.forEach(c => {
                if (c.key === '') counts[''] = taskList.length;
                else counts[c.key] = taskList.filter(t => t.status === c.key).length;
            });

            container.innerHTML = FILTER_CHIPS.map(chip => {
                const active = taskFilterStatus === chip.key ? ' active' : '';
                const count = counts[chip.key] ?? 0;
                return `<span class="task-filter-chip${active}" data-filter="${chip.key}">
                    ${chip.label}<span class="count">${count}</span>
                </span>`;
            }).join('');

            // 绑定点击
            container.querySelectorAll('.task-filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    taskFilterStatus = chip.dataset.filter;
                    renderFilterChips();
                    renderTaskTable();
                });
            });
        }

        // ── 获取任务列表 ────────────────────────────────
        async function fetchTasks() {
            const tbody = document.getElementById('taskTableBody');
            const refreshBtn = document.getElementById('taskRefreshBtn');
            if (!tbody) return;
            if (refreshBtn) refreshBtn.disabled = true;

            try {
                let url = 'http://localhost:8000/tasks';
                if (taskFilterStatus) url += `?status_filter=${encodeURIComponent(taskFilterStatus)}`;

                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                taskList = await res.json();
                renderFilterChips();
                renderTaskTable();
            } catch(err) {
                console.error('获取任务列表失败:', err);
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">❌</div><div class="text">加载失败: ${err.message}</div></div></td></tr>`;
            } finally {
                if (refreshBtn) refreshBtn.disabled = false;
            }
        }

        function renderTaskTable() {
            const tbody = document.getElementById('taskTableBody');
            if (!tbody) return;

            // 按筛选条件过滤
            let filtered = taskList;
            if (taskFilterStatus) {
                filtered = taskList.filter(t => t.status === taskFilterStatus);
            }

            if (!filtered || filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="icon">📋</div><div class="text">暂无${taskFilterStatus ? '符合条件' : ''}的任务</div></div></td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map((t, i) => {
                const statusBadge = getTaskStatusBadge(t.status);
                const progressHtml = renderProgressBar(t);
                const timeStr = formatTime(t.updated_at) || formatTime(t.created_at);
                const goalPreview = (t.goal || '').length > 60 ? t.goal.slice(0, 60) + '...' : (t.goal || '');

                // 判断可执行的操作
                const canView = true;
                const canCancel = ['created', 'executing', 'waiting_human', 'waiting_event'].includes(t.status);
                const needsApproval = t.status === 'waiting_human';

                return `
                    <tr ${needsApproval ? 'style="background:#fffbeb;"' : ''}>
                        <td style="text-align:center;color:#94a3b8;">${i + 1}</td>
                        <td class="col-t-goal" title="${escapeHtml(t.goal || '')}">${escapeHtml(goalPreview)}</td>
                        <td class="col-t-status">${statusBadge}</td>
                        <td class="col-t-progress">${progressHtml}</td>
                        <td class="col-t-time" style="font-size:12px;color:#64748b;">${timeStr}</td>
                        <td class="col-t-actions">
                            <button class="task-action-btn task-action-btn-detail" data-task-id="${t.task_id}">详情</button>
                            ${canCancel ? `<button class="task-action-btn task-action-btn-cancel" data-task-id="${t.task_id}">取消</button>` : ''}
                        </td>
                    </tr>
                `;
            }).join('');

            // 绑定事件
            tbody.querySelectorAll('.task-action-btn-detail').forEach(btn => {
                btn.addEventListener('click', () => viewTaskDetail(btn.dataset.taskId));
            });
            tbody.querySelectorAll('.task-action-btn-cancel').forEach(btn => {
                btn.addEventListener('click', () => cancelTaskConfirm(btn.dataset.taskId));
            });

            // 如果之前打开了详情，刷新详情
            if (taskDetailId) {
                const task = taskList.find(t => t.task_id === taskDetailId);
                if (task) renderTaskDetail(task);
            }
        }

        function renderProgressBar(task) {
            const status = task.status;
            if (status === 'completed') {
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:100%;background:linear-gradient(90deg,#16a34a,#4ade80);"></div></div>
                    <span class="task-progress-text" style="color:#16a34a;">✅ 完成</span>
                </div>`;
            }
            if (status === 'failed') {
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:100%;background:linear-gradient(90deg,#dc2626,#f87171);"></div></div>
                    <span class="task-progress-text" style="color:#dc2626;">❌ 失败</span>
                </div>`;
            }
            if (status === 'cancelled') {
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:100%;background:#cbd5e1;"></div></div>
                    <span class="task-progress-text" style="color:#94a3b8;">已取消</span>
                </div>`;
            }
            if (status === 'created' || status === 'planning') {
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:15%;"></div></div>
                    <span class="task-progress-text">准备中</span>
                </div>`;
            }
            if (status === 'executing') {
                // 通过 plan 长度估算进度
                const planSteps = (task.plan || []).length;
                const pct = planSteps > 0 ? Math.max(30, Math.floor(100 / (planSteps + 2))) : 50;
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:${pct}%;animation:pulse 1.5s infinite;"></div></div>
                    <span class="task-progress-text">${task.progress || '执行中...'}</span>
                </div>`;
            }
            if (status === 'waiting_human') {
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:70%;background:linear-gradient(90deg,#f59e0b,#fbbf24);"></div></div>
                    <span class="task-progress-text" style="color:#d97706;">⏸ 待审批</span>
                </div>`;
            }
            if (status === 'waiting_event') {
                return `<div class="task-progress-bar-wrap">
                    <div class="task-progress-bar"><div class="task-progress-bar-fill" style="width:65%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);"></div></div>
                    <span class="task-progress-text" style="color:#7c3aed;">⏳ 等待中</span>
                </div>`;
            }
            return `<span style="font-size:12px;color:#64748b;">${task.progress || ''}</span>`;
        }

        // ── 任务详情 ────────────────────────────────────
        async function viewTaskDetail(taskId) {
            const panel = document.getElementById('taskDetailPanel');
            const grid = document.getElementById('taskDetailGrid');
            const approvalArea = document.getElementById('taskApprovalArea');
            if (!panel || !grid) return;

            // 先从本地列表获取
            let task = taskList.find(t => t.task_id === taskId);

            // 如果本地没有或需要最新数据，从 API 获取
            try {
                const res = await fetch(`http://localhost:8000/tasks/${taskId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    task = await res.json();
                    // 更新本地列表
                    const idx = taskList.findIndex(t => t.task_id === taskId);
                    if (idx >= 0) taskList[idx] = task;
                    else taskList.push(task);
                }
            } catch(err) {
                console.error('获取任务详情失败:', err);
                if (!task) {
                    alert('获取任务详情失败');
                    return;
                }
            }

            taskDetailId = taskId;
            renderTaskDetail(task);
            panel.classList.add('open');

            // 连接到该任务的 SSE 事件流
            connectTaskEvents(taskId);
        }

        function renderTaskDetail(task) {
            const grid = document.getElementById('taskDetailGrid');
            const approvalArea = document.getElementById('taskApprovalArea');
            if (!grid) return;

            const planHtml = (task.plan && task.plan.length > 0)
                ? `<div class="detail-item full-width">
                    <div class="detail-label">📋 执行计划</div>
                    <ul class="task-plan-list">
                        ${task.plan.map((step, i) => `
                            <li>
                                <span class="plan-step-num">${i + 1}</span>
                                <span class="plan-step-text">${escapeHtml(typeof step === 'string' ? step : (step.description || step.goal || JSON.stringify(step)))}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>`
                : '';

            grid.innerHTML = `
                <div class="detail-item">
                    <div class="detail-label">🎯 任务目标</div>
                    <div class="detail-value">${escapeHtml(task.goal || '')}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">📌 状态</div>
                    <div class="detail-value">${getTaskStatusBadge(task.status)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">🆔 任务 ID</div>
                    <div class="detail-value" style="font-family:monospace;font-size:12px;">${escapeHtml(task.task_id)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">🧵 线程 ID</div>
                    <div class="detail-value" style="font-family:monospace;font-size:12px;">${escapeHtml(task.thread_id)}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">⏰ 创建时间</div>
                    <div class="detail-value">${escapeHtml(task.created_at ? new Date(task.created_at).toLocaleString('zh-CN') : '')}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">🕐 更新时间</div>
                    <div class="detail-value">${escapeHtml(task.updated_at ? new Date(task.updated_at).toLocaleString('zh-CN') : '')}</div>
                </div>
                ${task.progress ? `
                <div class="detail-item full-width">
                    <div class="detail-label">📝 当前进度</div>
                    <div class="detail-value">${escapeHtml(task.progress)}</div>
                </div>` : ''}
                ${task.result_summary ? `
                <div class="detail-item full-width">
                    <div class="detail-label">✅ 结果摘要</div>
                    <div class="detail-value" style="line-height:1.6;">${escapeHtml(task.result_summary)}</div>
                </div>` : ''}
                ${task.error_message ? `
                <div class="detail-item full-width">
                    <div class="detail-label">❌ 错误信息</div>
                    <div class="detail-value" style="color:#dc2626;">${escapeHtml(task.error_message)}</div>
                </div>` : ''}
                ${planHtml}
            `;

            // 审批区域
            if (task.status === 'waiting_human') {
                const question = task.progress || '需要您的审批决策';
                approvalArea.innerHTML = `
                    <div class="task-approval-area">
                        <h3>🔔 需要您的决策</h3>
                        <div class="task-approval-question">${escapeHtml(question)}</div>
                        <textarea class="task-approval-comment" id="taskApprovalComment" placeholder="备注说明（可选）..."></textarea>
                        <div class="task-approval-actions">
                            <button class="task-approve-btn approve" id="taskApproveBtn">✅ 批准</button>
                            <button class="task-approve-btn reject" id="taskRejectBtn">❌ 拒绝</button>
                        </div>
                    </div>
                `;
                // 绑定审批按钮
                setTimeout(() => {
                    document.getElementById('taskApproveBtn')?.addEventListener('click', () => resumeTask(task.task_id, 'approved'));
                    document.getElementById('taskRejectBtn')?.addEventListener('click', () => resumeTask(task.task_id, 'rejected'));
                }, 0);
            } else {
                approvalArea.innerHTML = '';
            }
        }

        function closeTaskDetail() {
            const panel = document.getElementById('taskDetailPanel');
            if (panel) panel.classList.remove('open');
            taskDetailId = null;
            disconnectTaskEvents();
        }

        // ── 审批/恢复任务 ───────────────────────────────
        async function resumeTask(taskId, action) {
            const comment = document.getElementById('taskApprovalComment')?.value || '';
            const approveBtn = document.getElementById('taskApproveBtn');
            const rejectBtn = document.getElementById('taskRejectBtn');

            if (approveBtn) approveBtn.disabled = true;
            if (rejectBtn) rejectBtn.disabled = true;

            try {
                const res = await fetch(`http://localhost:8000/tasks/${taskId}/resume`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        action: action,
                        comment: comment || null,
                    }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || `HTTP ${res.status}`);
                }
                const updatedTask = await res.json();

                // 更新本地列表
                const idx = taskList.findIndex(t => t.task_id === taskId);
                if (idx >= 0) taskList[idx] = updatedTask;

                renderFilterChips();
                renderTaskTable();
                renderTaskDetail(updatedTask);

                // 显示操作结果
                const approvalArea = document.getElementById('taskApprovalArea');
                if (approvalArea) {
                    approvalArea.innerHTML = `<div style="padding:12px;text-align:center;color:#16a34a;font-weight:500;">
                        ✅ 已${action === 'approved' ? '批准' : action === 'rejected' ? '拒绝' : '提交'}，任务继续执行中...
                    </div>`;
                    setTimeout(() => {
                        if (taskDetailId === taskId) approvalArea.innerHTML = '';
                    }, 3000);
                }
            } catch(err) {
                console.error('操作失败:', err);
                alert('操作失败: ' + err.message);
            } finally {
                if (approveBtn) approveBtn.disabled = false;
                if (rejectBtn) rejectBtn.disabled = false;
            }
        }

        // ── 取消任务 ────────────────────────────────────
        async function cancelTaskConfirm(taskId) {
            if (!confirm('确定要取消此任务吗？取消后不可恢复。')) return;

            try {
                const res = await fetch(`http://localhost:8000/tasks/${taskId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || `HTTP ${res.status}`);
                }

                // 更新本地列表
                const task = taskList.find(t => t.task_id === taskId);
                if (task) {
                    task.status = 'cancelled';
                    task.updated_at = new Date().toISOString();
                }

                renderFilterChips();
                renderTaskTable();
                if (taskDetailId === taskId) closeTaskDetail();
            } catch(err) {
                console.error('取消任务失败:', err);
                alert('取消任务失败: ' + err.message);
            }
        }

        // ── SSE 实时事件流 ──────────────────────────────
        function connectTaskEvents(taskId) {
            disconnectTaskEvents();
            if (!token) return;

            taskEventSource = new EventSource(
                `http://localhost:8000/tasks/${taskId}/events?token=${token}`
            );

            taskEventSource.addEventListener('task_update', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    handleTaskEvent(data);
                } catch(err) {
                    console.warn('任务事件解析失败', err);
                }
            });

            taskEventSource.addEventListener('heartbeat', () => {
                // 保持连接
            });

            taskEventSource.onerror = () => {
                if (taskEventSource) {
                    taskEventSource.close();
                    taskEventSource = null;
                }
                // 断线后 5 秒自动重连
                if (taskDetailId && token) {
                    setTimeout(() => {
                        if (taskDetailId && token && !taskEventSource) {
                            connectTaskEvents(taskDetailId);
                        }
                    }, 5000);
                }
            };
        }

        function disconnectTaskEvents() {
            if (taskEventSource) {
                taskEventSource.close();
                taskEventSource = null;
            }
        }

        function handleTaskEvent(data) {
            // data 格式: { task_id, status, progress, plan, ... }
            const taskId = data.task_id;
            if (!taskId) return;

            // 更新本地列表
            const idx = taskList.findIndex(t => t.task_id === taskId);
            if (idx >= 0) {
                // 合并更新
                const existing = taskList[idx];
                taskList[idx] = {
                    ...existing,
                    ...data,
                    status: data.status || existing.status,
                    progress: data.progress || existing.progress,
                    result_summary: data.result_summary || existing.result_summary,
                    error_message: data.error_message || existing.error_message,
                    plan: data.plan || existing.plan,
                    updated_at: data.updated_at || new Date().toISOString(),
                };
            } else {
                taskList.push(data);
            }

            renderFilterChips();
            renderTaskTable();

            // 如果正在查看该任务，刷新详情
            if (taskDetailId === taskId) {
                const task = taskList.find(t => t.task_id === taskId);
                if (task) renderTaskDetail(task);
            }
        }

        // ── 自动刷新 ────────────────────────────────────
        function startTaskAutoRefresh() {
            stopTaskAutoRefresh();
            taskRefreshTimer = setInterval(() => {
                if (document.getElementById('taskOverlay')) {
                    fetchTasks();
                } else {
                    stopTaskAutoRefresh();
                }
            }, 10000);  // 每10秒刷新
        }

        function stopTaskAutoRefresh() {
            if (taskRefreshTimer) {
                clearInterval(taskRefreshTimer);
                taskRefreshTimer = null;
            }
        }

        // =============================================================
        //  认证模块
        // =============================================================
        function showAuthModal() {
            const overlay = document.createElement('div');
            overlay.className = 'auth-overlay';
            overlay.innerHTML = `
                <div class="auth-card">
                    <div class="auth-title" id="authTitle">登录</div>
                    <input type="text" id="authUsername" class="auth-input" placeholder="用户名" autocomplete="off">
                    <input type="password" id="authPassword" class="auth-input" placeholder="密码">
                    <button id="authActionBtn" class="auth-btn">登录</button>
                    <div class="auth-switch" id="toggleAuthMode">还没有账号？立即注册</div>
                </div>
            `;
            document.body.appendChild(overlay);
            let isLogin = true;
            const authTitle = overlay.querySelector('#authTitle');
            const actionBtn = overlay.querySelector('#authActionBtn');
            const toggle = overlay.querySelector('#toggleAuthMode');
            const usernameInput = overlay.querySelector('#authUsername');
            const passwordInput = overlay.querySelector('#authPassword');
            const handleAuth = async () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();
                if (!username || !password) return;
                const url = isLogin ? 'http://localhost:8000/auth/login' : 'http://localhost:8000/auth/register';
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        token = data.access_token;
                        currentUserId = data.user_id;
                        currentUsername = username;
                        localStorage.setItem('access_token', token);
                        localStorage.setItem('user_id', currentUserId);
                        localStorage.setItem('username', currentUsername);
                        await onLoginSuccess();
                        overlay.remove();
                    } else { alert(data.detail || '操作失败'); }
                } catch(err) { alert('网络错误'); }
            };
            actionBtn.onclick = handleAuth;
            toggle.onclick = () => {
                isLogin = !isLogin;
                authTitle.innerText = isLogin ? '登录' : '注册';
                actionBtn.innerText = isLogin ? '登录' : '注册';
                toggle.innerText = isLogin ? '还没有账号？立即注册' : '已有账号？去登录';
            };
        }

        async function onLoginSuccess() {
            try {
                const meRes = await fetch('http://localhost:8000/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (meRes.ok) {
                    const user = await meRes.json();
                    currentUserId = user.id;
                    currentUsername = user.username;
                    localStorage.setItem('user_id', currentUserId);
                    localStorage.setItem('username', currentUsername);
                }
            } catch(e) {}
            DOM.sidebarFooter.innerHTML = `
                <div class="user-info-card">
                    <div class="user-avatar">${currentUsername.charAt(0).toUpperCase()}</div>
                    <div class="user-detail">
                        <div class="user-name">${escapeHtml(currentUsername)}</div>
                    </div>
                    <button id="logoutBtnSidebar" class="logout-btn">退出</button>
                </div>
            `;
            document.getElementById('logoutBtnSidebar')?.addEventListener('click', () => {
                localStorage.clear();
                window.location.reload();
            });
            await fetchUserSessions();
            connectDocStatusEvents();
            if (currentSessions.length === 0) {
                resetToNewSession();
            } else if (!activeSessionId) {
                await switchSession(currentSessions[0].session_id);
            }
        }

        if (token && currentUserId) {
            onLoginSuccess();
        } else {
            DOM.sidebarFooter.innerHTML = '<button id="showLoginBtn" style="width:100%; background:#eef2ff; border:none; border-radius:32px; padding:10px; cursor:pointer;">🔐 登录 / 注册</button>';
            document.getElementById('showLoginBtn')?.addEventListener('click', showAuthModal);
            setCurrentSessionId(generateUUID());
        }

        DOM.newChatBtn.addEventListener('click', () => {
            if (!token) { showAuthModal(); return; }
            resetToNewSession();
        });
        DOM.sendBtn.addEventListener('click', sendMessage);
        DOM.messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        // 事件委托：处理动态生成的 sources/feedback 点击
        DOM.messagesArea.addEventListener('click', (e) => {
            // 引用来源折叠/展开
            const header = e.target.closest('.sources-header');
            if (header) {
                const arrow = header.querySelector('.arrow');
                const list = header.nextElementSibling;
                if (list) {
                    list.classList.toggle('collapsed');
                    if (arrow) arrow.classList.toggle('open');
                }
                return;
            }

            // 单条来源点击展开/收起摘要
            const item = e.target.closest('.source-item');
            if (item) {
                const snippet = item.querySelector('.source-snippet');
                if (snippet) snippet.classList.toggle('expanded');
                return;
            }

            // 有用/没用按钮
            const btn = e.target.closest('.feedback-btn');
            if (btn) {
                const sessionId = btn.dataset.session;
                const rating = parseInt(btn.dataset.rating);
                submitFeedback(sessionId, rating, btn);
                return;
            }
        });
    })();
</script>
</body>
